<script>
const checklist=[
{icon:'🎯',title:'标题与价值主张',items:[
{id:'hero',name:'有清晰的 Hero 标题',desc:'一句话说清楚你的产品是做什么的，3秒内让人看懂'},
{id:'subhead',name:'有副标题补充说明',desc:'用1-2句话补充核心价值，解释为什么用户需要它'},
{id:'value_props',name:'列出核心价值/优势',desc:'2-4个核心卖点，用图标+简短文案展示'}]},
{icon:'🖱️',title:'CTA（行动号召）',items:[
{id:'main_cta',name:'有醒目主 CTA 按钮',desc:'「免费试用」「立即开始」等，颜色要醒目，放在首屏'},
{id:'secondary_cta',name:'有次要 CTA',desc:'「了解更多」「观看演示」等，降低行动门槛'},
{id:'sticky_cta',name:'页面中有重复 CTA',desc:'长页面中每隔一段就放一次CTA，不要只放一次'},
{id:'cta_copy',name:'CTA文案具体',desc:'避免「提交」，用「免费获取方案」等有吸引力的文案'}]},
{icon:'👥',title:'社会证明',items:[
{id:'logos',name:'客户/Logo展示',desc:'知名客户的Logo或"被XX媒体报导"等背书'},
{id:'testimonials',name:'用户评价/证言',desc:'2-3个真实用户的评价，带头像和职位'},
{id:'numbers',name:'关键数据',desc:'「10,000+用户」「99%满意度」等有说服力的数字'},
{id:'reviews',name:'评分/评价星级',desc:'G2/Capterra/Trustpilot等第三方平台的评分'},
{id:'case_study',name:'成功案例/案例研究',desc:'1-2个详细的使用案例，说明使用前后的变化'}]},
{icon:'📦',title:'功能介绍',items:[
{id:'features',name:'核心功能列表',desc:'3-6个核心功能，用图标+简短描述'},
{id:'screenshots',name:'产品截图/演示',desc:'真实的产品界面截图或GIF动图'},
{id:'video',name:'产品演示视频',desc:'60-90秒的演示视频，展示核心功能'},
{id:'comparison',name:'与竞品对比',desc:'功能对比表格，突出自身优势'}]},
{icon:'🛡️',title:'信任与转化',items:[
{id:'pricing',name:'清晰的定价信息',desc:'至少展示一个免费/低价方案，价格透明'},
{id:'faq',name:'常见问题 FAQ',desc:'解答用户最关心的5-8个问题'},
{id:'guarantee',name:'退款/风险保证',desc:'「30天退款保证」「免费试用」等降低风险感'},
{id:'privacy',name:'隐私政策链接',desc:'页脚包含隐私政策、服务条款链接'},
{id:'security',name:'安全认证标识',desc:'SSL、SOC2、GDPR等安全/合规标识'}]},
{icon:'⚙️',title:'技术与体验',items:[
{id:'mobile',name:'移动端适配',desc:'页面在手机和平板上显示正常，操作流畅'},
{id:'speed',name:'页面加载速度快',desc:'首屏加载时间在3秒内，使用图片压缩和CDN'},
{id:'analytics',name:'安装了分析工具',desc:'Google Analytics / 热图工具，追踪用户行为'},
{id:'accessibility',name:'可访问性',desc:'对比度达标、有alt文本、键盘可操作'}]},
{icon:'📧',title:'联系与留存',items:[
{id:'contact',name:'联系方式可见',desc:'邮箱、表单或在线客服入口'},
{id:'newsletter',name:'邮件订阅入口',desc:'「订阅获取最新更新」或「加入等待名单」'},
{id:'social',name:'社交媒体链接',desc:'Twitter / GitHub / Discord 等社交入口'},
{id:'chat',name:'在线客服/Chatbot',desc:'即时聊天工具，快速响应用户咨询'}]}
];
const STORAGE_KEY='landing_checklist_v1';
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return {};}}
function saveState(state){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function render(){
const state=loadState();
let html='';
checklist.forEach(cat=>{
html+='<div class="category' + (cat.items.every(i=>state[i.id])?' open':'') + '">';
html+='<div class="category-header" onclick="toggleCat(this)">';
html+='<span class="category-icon">'+cat.icon+'</span>';
html+='<h3>'+cat.title+'</h3>';
const done=cat.items.filter(i=>state[i.id]).length;
html+='<span class="category-count">'+done+'/'+cat.items.length+'</span>';
html+='</div><div class="category-children">';
cat.items.forEach(item=>{
const checked=state[item.id];
html+='<div class="check-item'+(checked?' checked':'')+'">';
html+='<input type="checkbox" id="'+item.id+'"'+(checked?' checked':'')+' onchange="toggle(this,\''+item.id+'\')">';
html+='<label class="check-label" for="'+item.id+'">';
html+='<strong>'+item.name+'</strong>';
html+='<p>'+item.desc+'</p>';
html+='</label></div>';
});
html+='</div></div>';
});
document.getElementById('checklist').innerHTML=html;
updateProgress();
}
function toggle(el,id){
const state=loadState();
if(el.checked)state[id]=true;else state[id]=false;
saveState(state);
el.closest('.check-item').classList.toggle('checked',el.checked);
updateProgress();
}
function toggleCat(header){header.closest('.category').classList.toggle('open');}
function updateProgress(){
const state=loadState();
let total=0,done=0;
checklist.forEach(cat=>cat.items.forEach(i=>{total++;if(state[i.id])done++;}));
const pct=Math.round(done/total*100);
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent='已完成 '+done+' / '+total+'（'+pct+'%）';
}
function resetAll(){
if(confirm('确定要重置所有勾选吗？')){localStorage.removeItem(STORAGE_KEY);render();}
}
render();
</script>
