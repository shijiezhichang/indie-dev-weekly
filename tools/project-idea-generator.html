let history=[];
function generate(){
const domain=document.getElementById('domain').value;
const techstack=document.getElementById('techstack').value;
let pool=[];
if(domain&&ideas[domain]){pool=ideas[domain];}
else{Object.values(ideas).forEach(a=>pool=pool.concat(a));}
const idea=pool[Math.floor(Math.random()*pool.length)];
const techHint=techstack?('（推荐技术栈：'+techstack+'）'):'';
document.getElementById('ideaTitle').textContent=idea.name+techHint;
document.getElementById('ideaUser').textContent=idea.user;
document.getElementById('ideaFeatures').textContent=idea.features;
document.getElementById('ideaMonetize').textContent=idea.monetize;
document.getElementById('ideaMVP').textContent=idea.mvp;
const domainNames={saas:'SaaS',devtool:'开发者工具',ecommerce:'电商',social:'社交',education:'教育',health:'健康'};
const tags=document.getElementById('ideaTags');
tags.innerHTML='';
tags.innerHTML+='<span class="idea-tag">'+(domainNames[domain]||'综合')+'</span>';
if(techstack)tags.innerHTML+='<span class="idea-tag">'+techstack+'</span>';
tags.innerHTML+='<span class="idea-tag">MVP优先</span>';
document.getElementById('resultCard').classList.add('show');
document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
history.unshift({title:idea.name,time:new Date().toLocaleString()});
if(history.length>5)history.pop();
renderHistory();
}
function renderHistory(){
if(history.length===0)return;
document.getElementById('historySection').style.display='block';
document.getElementById('historyList').innerHTML=history.map(h=>'<div class="history-item"><span class="hist-title">'+h.title+'</span> · '+h.time+'</div>').join('');
}
